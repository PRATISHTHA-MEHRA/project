<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marks · BrightPath Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-style.css">
</head>

<body>
  <script src="assets/js/admin-data.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin-app.js"></script>
  <script>
    if (App.guard()) {
      let currentMarks = [];
      let examsList = [];
      let studentsList = [];

      // Sanitization utility helpers
      const esc = v => String(v ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
      const jsStr = v => String(v ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      const asNum = v => Number(v ?? 0) || 0;
      const unique = values => [...new Set(values.filter(Boolean))];

      function unwrapList(payload) {
  if (Array.isArray(payload)) return payload;
  if (Array.isArray(payload?.data)) return payload.data;
  if (Array.isArray(payload?.data?.data)) return payload.data.data;
  if (Array.isArray(payload?.rows)) return payload.rows;
  return [];
}

      function mapMark(item = {}) {
        return {
          examId: item.examId || item.exam_id || '',
          exam: item.exam || item.examName || item.exam_name || '',
          batch: item.batch || item.batch_name || '',
          subject: item.subject || item.subject_name || '',
          total: asNum(item.total ?? item.total_marks ?? 100),
          // NOTE: getMarksWithRankings doesn't currently SELECT student_id, so this
          // will be blank until the backend query adds it — see message below.
          studentId: item.studentId || item.student_id || '',
          student: item.student || item.student_name || 'Unknown',
          obtained: asNum(item.obtained ?? item.marks_obtained ?? 0),
          remarks: item.remarks || '',
          rank: item.rank || 0,
          grade: item.grade || ''
        };
      }

      function normStudent(s = {}) {
        return {
          id: s.student_code || s.studentId || s.id || '',
          name: s.student_name || s.name || s.studentName || '',
          batch: s.batch_name || s.batch || '',
          course: s.course_name || s.course || ''
        };
      }

      function fallbackMarks() {
        return (DB.marks || []).slice(0, 50).map(mapMark);
      }

      function calcPct(m) { return m.total ? Math.round(m.obtained / m.total * 100) : 0; }

      function studentsForExam(exam) {
        if (!exam) return [];
        return studentsList.filter(s =>
          s.batch === exam.batch && (!exam.course || s.course === exam.course)
        );
      }

      function renderMarksPage(rows) {
        currentMarks = rows;
        const totalEntries = rows.length;
        const avgPct = rows.length ? Math.round(rows.reduce((a, r) => a + calcPct(r), 0) / rows.length) : 0;

        const head = `<button class="btn btn-light" onclick="App.toast('Result sheet exported','ok')">${App.svg('download')}Export</button><button class="btn btn-primary" onclick="addMarks()">${App.svg('plus')}Enter Marks</button>`;
        const c = App.layout('marks', 'Marks & Results', [`<span>Assessment</span>`, 'Marks'], head);
        c.innerHTML = `<div class="card mb16"><div class="card-head"><div><h3>Marks Overview</h3><div class="sub">Total entries: ${totalEntries} · Avg %: ${avgPct}%</div></div></div></div><div id="tbl"></div>`;

        App.table('tbl', {
          rows,
          searchKeys: ['exam', 'student', 'batch', 'subject'],
          searchPlaceholder: 'Search marks…',
          pageSize: 12,
          filters: [
            { label: 'Exam', key: 'exam', options: unique(rows.map(m => m.exam)) },
            { label: 'Batch', key: 'batch', options: unique(rows.map(m => m.batch)) },
            { label: 'Subject', key: 'subject', options: unique(rows.map(m => m.subject)) }
          ],
          columns: [
            { key: 'student', label: 'Student', render: r => App.whoCell(esc(r.student), esc(r.studentId)) },
            { key: 'exam', label: 'Test', render: r => `<div>${esc(r.exam)}</div><div class="t-sub">${esc(r.batch)}</div>` },
            { key: 'subject', label: 'Subject' },
            { key: 'obtained', label: 'Score', num: true, render: r => `<b>${r.obtained}</b> / ${r.total}` },
            { key: 'pct', label: '%', num: true, render: r => `<div class="pct-cell"><div class="progress ${r.obtained / r.total < 0.4 ? 'danger' : r.obtained / r.total < 0.6 ? 'warn' : ''}"><span style="width:${Math.round(r.obtained / r.total * 100)}%"></span></div><span class="num">${Math.round(r.obtained / r.total * 100)}%</span></div>` },
            { key: 'rank', label: 'Rank', num: true, render: r => `#${r.rank || '-'}` },
            { key: 'grade', label: 'Grade', render: r => `<span class="badge ${r.grade && r.grade.startsWith('A') ? 'b-green' : r.grade && r.grade.startsWith('B') ? 'b-blue' : 'b-amber'}"><span class="pip"></span>${esc(r.grade || '-')}</span>` },
            { key: 'remarks', label: 'Remark' }
          ],
          actions: r => `${App.actBtn('eye', 'View', `onclick="viewMark('${jsStr(r.examId)}','${jsStr(r.student)}')"`)}${App.actBtn('edit', 'Edit', "App.toast('Edit marks','info')")}`
        });
      }

      async function loadMarks() {
        try {
          const res = await API.get('/marks');
          renderMarksPage(unwrapList(res).map(mapMark));
        } catch (err) {
          console.warn('Marks API unavailable, showing local data:', err);
          renderMarksPage(fallbackMarks());
          App.toast(err.message || 'Marks API unavailable. Showing local data.', 'info');
        }
      }

      async function loadFormData() {
        try {
          const [examsRes, studentsRes] = await Promise.all([API.get('/exams'), API.get('/students')]);
          examsList = unwrapList(examsRes);
          studentsList = unwrapList(studentsRes).map(normStudent);
        } catch (err) {
          App.toast('Failed to load exams/students — falling back to sample list', 'err');
          examsList = DB.exams || [];
          studentsList = (DB.students || []).map(normStudent);
        }
      }

      window.viewMark = (examId, studentName) => {
        const m = currentMarks.find(x => String(x.examId) === String(examId) && x.student === studentName);
        if (!m) return App.toast('Marks not found', 'err');
        App.modal({
          size: 'md', title: esc(m.student) + ' · ' + esc(m.exam), sub: esc(m.batch),
          body: `<div class="dl cols-2"><div class="it"><div class="k">Subject</div><div class="v">${esc(m.subject)}</div></div>
<div class="it"><div class="k">Score</div><div class="v num">${m.obtained} / ${m.total}</div></div>
<div class="it"><div class="k">Percentage</div><div class="v num">${calcPct(m)}%</div></div>
<div class="it"><div class="k">Rank</div><div class="v num">#${m.rank || '-'}</div></div>
<div class="it"><div class="k">Grade</div><div class="v">${esc(m.grade || '-')}</div></div></div>
<div class="sec-title">Remarks</div><p style="color:var(--ink-2)">${esc(m.remarks || '—')}</p>`
        });
      };

      window.addMarks = () => {
        if (!examsList.length) return App.toast('No exams found — create a test first', 'err');

        function studentRowsHtml(exam) {
          const studs = studentsForExam(exam);
          if (!studs.length) return `<tr><td colspan="3" style="text-align:center;color:var(--ink-2)">No students found for ${esc(exam.batch)}</td></tr>`;
          return studs.map(s => `<tr data-stu="${esc(s.id)}" data-name="${esc(s.name)}"><td>${App.whoCell(esc(s.name), esc(s.id))}</td><td><input class="num m-obt" style="width:80px;padding:5px 8px;border:1px solid var(--line-2);border-radius:6px" value="${Math.round((exam.total || 100) * 0.7)}"></td><td><input class="m-remark" style="padding:5px 8px;border:1px solid var(--line-2);border-radius:6px" placeholder="Optional remark"></td></tr>`).join('');
        }

        const examOptionsHtml = examsList.map(e => `<option value="${esc(e.id)}">${esc(e.name)} · ${esc(e.batch)}</option>`).join('');
        const initialExam = examsList[0];

        App.modal({
          size: 'lg',
          title: 'Enter Marks (Bulk)',
          sub: 'Pick a test, then enter scores for its students',
          body: `<div class="form-grid" style="margin-bottom:16px">
<div><label>Test</label><select id="m_exam">${examOptionsHtml}</select></div>
<div><label>Total Marks</label><input id="m_total" class="num" value="${esc(initialExam.total)}" disabled></div>
</div>
<div class="tbl-wrap"><table class="tbl"><thead><tr><th>Student</th><th style="width:120px">Marks</th><th>Remark</th></tr></thead>
<tbody id="m_rows">${studentRowsHtml(initialExam)}</tbody></table></div>`,
          foot: `<button class="btn btn-light" data-close>Cancel</button><button class="btn btn-primary" id="saveMarksBtn">Save & Publish</button>`,
          onOpen: box => {
            const examSelect = box.querySelector('#m_exam');
            const totalInput = box.querySelector('#m_total');
            const rowsBody = box.querySelector('#m_rows');

            examSelect.onchange = () => {
              const exam = examsList.find(e => String(e.id) === examSelect.value);
              totalInput.value = exam.total;
              rowsBody.innerHTML = studentRowsHtml(exam);
            };

            box.querySelector('#saveMarksBtn').onclick = async () => {
              const exam = examsList.find(e => String(e.id) === examSelect.value);
              const rows = [...box.querySelectorAll('#m_rows tr[data-stu]')].map(tr => ({
                studentId: tr.getAttribute('data-stu'),
                studentName: tr.getAttribute('data-name'),
                obtained: asNum(tr.querySelector('.m-obt').value),
                remarks: tr.querySelector('.m-remark').value.trim()
              }));
              if (!rows.length) return App.toast('No students to save marks for', 'err');

              const payload = {
                examId: exam.id,
                examName: exam.name,
                batch: exam.batch,
                subject: exam.subject,
                total: asNum(exam.total),
                scores: rows
              };

              try {
                await API.post('/marks/bulk', payload);
                App.closeModal();
                App.toast('Marks saved & result published', 'ok');
                loadMarks();
              } catch (err) {
                App.toast(err.message || 'Failed to save marks', 'err');
              }
            };
          }
        });
      };

      loadFormData();
      loadMarks();
    }
  </script>
</body>

</html>
