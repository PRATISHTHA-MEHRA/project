<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance · BrightPath Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin-style.css">
</head>
<body>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/admin-app.js"></script>
<script>
if(App.guard()){
  let dashboardData = null;
  let currentRows = [];
  let selectedDate = new Date().toISOString().slice(0, 10);

  const head=`<button class="btn btn-primary" onclick="markAtt()">${App.svg('check')}Mark Attendance</button>`;
  const c=App.layout('attendance','Attendance',['Attendance'],head);

  const esc = v => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

  
  const mapKpis = k => ({
    overall: k?.overallAttendance ?? '0%',
    presentToday: k?.presentToday ?? 0,
    absentToday: k?.absentToday ?? 0,
    lateToday: k?.lateToday ?? 0
  });

  function renderDashboard(kpis, rows) {
    currentRows = rows;

    c.innerHTML=`<div class="kpi-grid">
      <div class="kpi"><div class="top"><span class="label">Overall Attendance</span><span class="ic b-brand">${App.svg('attendance')}</span></div><div class="val">${esc(kpis.overall)}</div></div>
      <div class="kpi"><div class="top"><span class="label">Present Today</span><span class="ic b-green">${App.svg('check')}</span></div><div class="val">${esc(kpis.presentToday)}</div></div>
      <div class="kpi"><div class="top"><span class="label">Absent Today</span><span class="ic b-red">${App.svg('x')}</span></div><div class="val">${esc(kpis.absentToday)}</div></div>
      <div class="kpi"><div class="top"><span class="label">Late Today</span><span class="ic b-amber">${App.svg('clock')}</span></div><div class="val">${esc(kpis.lateToday)}</div></div>
    </div><div id="tbl"></div>`;

    App.table('tbl',{
      rows: currentRows,
      searchKeys:['id','name','batch'],
      searchPlaceholder:'Search students…',
      pageSize:10,
      dateFilter:true,
      dateValue: selectedDate,
      onDateChange: async (newDate) => {
        selectedDate = newDate;
        await loadDashboard(selectedDate);
      },
      filters:[
        {label:'Batch', key:'batch', options:[...new Set(currentRows.map(r=>r.batch))]},
        {label:'Status', key:'last', options:['Present','Absent','Late','Leave','Not Marked']}
      ],
      columns:[
        {key:'name',label:'Student',render:r=>App.whoCell(esc(r.name), esc(r.id)+' · '+esc(r.batch))},
        {key:'present',label:'Present',num:true},
        {key:'absent',label:'Absent',num:true},
        {key:'late',label:'Late',num:true},
        {key:'leave',label:'Leave',num:true},
        {key:'pct',label:'Attendance %',num:true,render:r=>`<div class="pct-cell"><div class="progress ${r.pct<75?'danger':r.pct<85?'warn':''}"><span style="width:${r.pct}%"></span></div><span class="num">${r.pct}%</span></div>`},
        {key:'last',label:'Status on Selected Date',render:r=>App.badge(esc(r.last))}
      ],
      actions:r=>`${App.actBtn('eye','View',`onclick="viewAtt('${esc(r.id)}')"`)}`
    });
  }

  async function loadDashboard(dateStr) {
    const date = dateStr || selectedDate;
    try {
      const res = await API.get(`/attendance/dashboard?date=${date}`);
      renderDashboard(mapKpis(res.kpis), res.data || []);
    } catch (err) {
      App.toast(err.message || 'Failed to load attendance dashboard', 'err');
      renderDashboard(mapKpis({}), []);
    }
  }

  window.viewAtt = async id => {
    const r = currentRows.find(item => item.id === id);
    if (!r) return App.toast('Profile data scope error', 'err');

    let historyHtml = '<tr><td colspan="3" class="t-sub">No records found.</td></tr>';
    try {
      const res = await API.get(`/attendance/student/${encodeURIComponent(id)}`);
      const logs = res?.history || [];
      if (logs.length) {
        historyHtml = logs.map(log => `<tr><td>${esc(log.date)}</td><td>${esc(log.batch)}</td><td>${App.badge(esc(log.status))}</td></tr>`).join('');
      }
    } catch (e) {
      App.toast(e.message || 'Failed to load attendance history', 'err');
    }

    App.modal({
      size:'md', title: esc(r.name) + ' · Attendance', sub: esc(r.batch),
      body:`<div class="dl cols-2"><div class="it"><div class="k">Present</div><div class="v num">${esc(r.present)} days</div></div>
        <div class="it"><div class="k">Absent</div><div class="v num">${esc(r.absent)} days</div></div>
        <div class="it"><div class="k">Late</div><div class="v num">${esc(r.late)} days</div></div><div class="it"><div class="k">Leave</div><div class="v num">${esc(r.leave)} days</div></div>
        <div class="it"><div class="k">Overall</div><div class="v num">${esc(r.pct)}%</div></div></div>
      <div class="progress ${r.pct<75?'danger':''} mt16" style="height:10px"><span style="width:${r.pct}%"></span></div>
      <div class="sec-title">Recent Register</div>
      <div class="tbl-wrap"><table class="tbl"><thead><tr><th>Date</th><th>Batch</th><th>Status</th></tr></thead>
      <tbody>${historyHtml}</tbody></table></div>`
    });
  };

  window.markAtt = async () => {
    const targetDate = new Date().toISOString().slice(0, 10);
    let activeRoster = [];
    let marks = {};

    let batchList = [];
    try {
      const res = await API.get('/batches');
      batchList = (res?.data || []).map(b => b.name).filter(Boolean);
    } catch (err) {
      App.toast(err.message || 'Failed to load batch list', 'err');
    }
    if (!batchList.length) batchList = DB.batches.map(b => b.name); // last-resort fallback if /batches is unreachable
    const defaultBatch = batchList[0];

    const syncRosterView = async (batchName, boxElement) => {
      const cardContainer = boxElement.querySelector('#roster_card_container');
      if (cardContainer) cardContainer.innerHTML = '<div class="p16 t-sub">Loading roster…</div>';

      try {
        const res = await API.get(`/attendance/roster?batch=${encodeURIComponent(batchName)}`);
        activeRoster = res?.data || [];
      } catch (err) {
        App.toast(err.message || 'Failed to load batch roster', 'err');
        activeRoster = [];
      }

      marks = {};
      activeRoster.forEach(s => marks[s.id] = 'Present');

      if (cardContainer) {
        cardContainer.innerHTML = activeRoster.map(s => `<div class="att-row"><div class="who-cell">${App.avatar(s.name)}<div><div class="t-main">${esc(s.name)}</div><div class="t-sub">${esc(s.id)}</div></div></div>
          <div class="att-opts" data-stu="${esc(s.id)}">
            <span class="att-opt p sel" data-v="Present">P</span><span class="att-opt a" data-v="Absent">A</span><span class="att-opt l" data-v="Late">L</span><span class="att-opt lv" data-v="Leave">Lv</span></div></div>`).join('') || '<div class="p16 t-sub">No student matches found for this batch roster.</div>';

        // Append event interceptors
        cardContainer.querySelectorAll('.att-opts').forEach(g => {
          g.querySelectorAll('.att-opt').forEach(o => o.onclick = () => {
            g.querySelectorAll('.att-opt').forEach(x => x.classList.remove('sel'));
            o.classList.add('sel');
            marks[g.dataset.stu] = o.dataset.v;
          });
        });
      }
    };

    App.modal({
      size:'lg', title:'Mark Attendance', sub:`Dynamic Daily Management Matrix`,
      body:`<div class="form-grid" style="margin-bottom:16px">
              <div><label>Batch</label><select id="ma_batch">${batchList.map(name=>`<option ${name === defaultBatch ? 'selected':''}>${esc(name)}</option>`).join('')}</select></div>
              <div><label>Date</label><input type="date" id="ma_date" value="${targetDate}"></div>
            </div>
            <div class="card" id="roster_card_container" style="box-shadow:none"></div>`,
      foot:`<button class="btn btn-light" data-close>Cancel</button><button class="btn btn-primary" id="ma_save">Submit Attendance</button>`,
      onOpen: async b => {
        await syncRosterView(defaultBatch, b);

        const batchSelect = b.querySelector('#ma_batch');
        batchSelect.onchange = async () => {
          await syncRosterView(batchSelect.value, b);
        };

        b.querySelector('#ma_save').onclick = async () => {
          const payload = {
            batch: batchSelect.value,
            date: b.querySelector('#ma_date').value,
            marks: marks
          };

          try {
            await API.post('/attendance/submit', payload);
            App.closeModal();
            selectedDate = payload.date;
            await loadDashboard(selectedDate);
            App.toast('Attendance locked successfully', 'ok');
          } catch(err) {
            App.toast(err.message || 'Submission routing error', 'err');
          }
        };
      }
    });
  };

  loadDashboard();
}
</script>
</body></html>
