<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports · BrightPath Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin-style.css">
</head>
<body>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/admin-app.js"></script>
<script>
if(App.guard()){

  function unwrapList(payload){
    if (Array.isArray(payload)) return payload;
    if (Array.isArray(payload?.data)) return payload.data;
    if (Array.isArray(payload?.rows)) return payload.rows;
    if (Array.isArray(payload?.result)) return payload.result;
    return [];
  }

  const normName = s => String(s || '').trim().toLowerCase();

  // ── live data — populated by loadAllData() before the page ever renders ──
  let feesList = [], pendingList = [], tpayList = [],
      incomeList = [], expenseList = [],
      studentsList = [], batchesList = [], coursesList = [],
      enquiriesList = [];
  let reportLogs = {}; // report_key -> "DD Mon YYYY, HH:MM AM"
  let collectionTrendLive = null, incomeExpenseLive = null; // live monthly aggregates (null until confirmed present)

  
  let selectedMonth = '2026-06'; // 'YYYY-MM', matches the <input type="month"> default
  let feesAllData = [], incomeAllData = [], expenseAllData = [];

  function monthKey(dateStr){
    if(!dateStr) return null;
    const d = new Date(dateStr);
    if(isNaN(d.getTime())) return null;
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }

  function monthLabel(ym){
    const [y,m] = (ym||'').split('-');
    if(!y||!m) return '';
    return new Date(Number(y), Number(m)-1, 1).toLocaleString('en-US',{month:'short'});
  }

  // Filters a list to the selected month using getDate(item) to pull the date field.
  // If NONE of the records have a parseable date (e.g. the API doesn't send that
  // field yet), filtering everything out would be worse than not filtering at all —
  // so in that case we fall back to showing the unfiltered list rather than a blank page.
  function filterByMonth(list, getDate){
    const withDates = list.filter(item => monthKey(getDate(item)));
    if(withDates.length === 0) return list;
    return withDates.filter(item => monthKey(getDate(item)) === selectedMonth);
  }

  function applyMonthFilter(){
    feesList    = filterByMonth(feesAllData,   f => f.date);
    incomeList  = filterByMonth(incomeAllData, x => x.date);
    expenseList = filterByMonth(expenseAllData,x => x.date);
  }

  window.onMonthChange = function(val){
    selectedMonth = val;
    applyMonthFilter();
    renderPage();
  };

  async function loadAllData(){
    try{
      const res = await API.get('/reports/dashboard');
      const d = res?.data ?? res; // handle either {success,data} or raw envelope

      feesAllData   = unwrapList(d.fees);
      pendingList   = unwrapList(d.pendingFees);
      tpayList      = unwrapList(d.teacherPayments);
      studentsList  = unwrapList(d.students);
      batchesList   = unwrapList(d.batches);
      coursesList   = unwrapList(d.courses);
      enquiriesList = unwrapList(d.enquiries);
      incomeAllData = unwrapList(d.income);
      expenseAllData= unwrapList(d.expense);
      reportLogs    = d.reportLogs || {};
      applyMonthFilter(); // populates feesList/incomeList/expenseList for the current selectedMonth

      collectionTrendLive = Array.isArray(d.collectionTrend) ? d.collectionTrend : null;
      incomeExpenseLive   = Array.isArray(d.incomeExpense) ? d.incomeExpense : null;
    }catch(err){
      App.toast('Could not load report data', 'error');
    }
  }

  async function logReport(key, name, action){
    try{
      const res = await API.post(`/reports/${key}/log`, { name, action });
      if(res?.data?.generated_at) reportLogs[key] = res.data.generated_at;
      const cell = document.querySelector(`#rptTbl tr[data-cat] [data-lastgen="${key}"]`);
      if(cell) cell.textContent = reportLogs[key];
    }catch(err){ /* logging is best-effort, don't block the toast/report */ }
  }

  const head=`
    <input type="month" class="filter-sel" id="monthFilter" value="2026-06" style="min-width:140px" onchange="onMonthChange(this.value)">
    <button class="btn btn-light" onclick="App.toast('Report pack exported (PDF)','ok')">${App.svg('download')}Export All</button>
    <button class="btn btn-primary" onclick="App.toast('Scheduled report email sent','ok')">${App.svg('bell')}Schedule</button>`;
  const c=App.layout('reports','Reports',[`<span>Insights</span>`,'Reports'],head);

  /* ───────── Category colour ───────── */
  const catClass={Finance:'b-brand',Academic:'b-blue',Marketing:'b-violet'};

  /* ───────── Report definitions (metadata only — content is fetched live) ───────── */
  const REPORTS=[
    {key:'daily-fee',   name:'Daily Fee Collection',    cat:'Finance',   period:'07 Jun 2026'},
    {key:'monthly-fee', name:'Monthly Fee Collection',  cat:'Finance',   period:'Jun 2026'},
    {key:'pending-fees',name:'Pending Fees Report',     cat:'Finance',   period:'Jun 2026'},
    {key:'teacher-due', name:'Teacher Payment Due',     cat:'Finance',   period:'May 2026'},
    {key:'income',      name:'Income Report',           cat:'Finance',   period:'Jun 2026'},
    {key:'expense',     name:'Expense Report',          cat:'Finance',   period:'Jun 2026'},
    {key:'pnl',         name:'Profit & Loss',           cat:'Finance',   period:'Jun 2026'},
    {key:'stu-att',     name:'Student Attendance',      cat:'Academic',  period:'Jun 2026'},
    {key:'batch-att',   name:'Batch Attendance',        cat:'Academic',  period:'Jun 2026'},
    {key:'admissions',  name:'Admission Report',        cat:'Academic',  period:'Q1 2026'},
    {key:'enquiry-conv',name:'Enquiry Conversion',      cat:'Marketing', period:'Jun 2026'},
    {key:'course-rev',  name:'Course-wise Revenue',     cat:'Finance',   period:'Jun 2026'},
    {key:'batch-rev',   name:'Batch-wise Revenue',      cat:'Finance',   period:'Jun 2026'},
    {key:'pay-mode',    name:'Payment Mode Report',     cat:'Finance',   period:'Jun 2026'},
    {key:'discount',    name:'Discount Report',         cat:'Finance',   period:'Jun 2026'},
  ];

  function recordCount(key){
    switch(key){
      case 'daily-fee': return Math.min(feesList.length,12);
      case 'monthly-fee': return Math.min(feesList.length,20);
      case 'pending-fees': return pendingList.length;
      case 'teacher-due': return tpayList.filter(t=>t.status!=='Paid').length;
      case 'income': return incomeList.length;
      case 'expense': return expenseList.length;
      case 'pnl': return 1;
      case 'stu-att': return studentsList.length;
      case 'batch-att': return batchesList.filter(b=>b.status!=='Upcoming').length;
      case 'admissions': return Math.min(studentsList.length,31);
      case 'enquiry-conv': return enquiriesList.length;
      case 'course-rev': return coursesList.length;
      case 'batch-rev': return batchesList.length;
      case 'pay-mode': return 5;
      case 'discount': return feesList.filter(f=>f.discount>0).length;
      default: return 0;
    }
  }

  function computeCourseRevenue(){
    return coursesList.map(cr=>{
      const studs = studentsList.filter(s=>s.course===cr.name && s.status==='Active').length;
      return { label: cr.name, value: studs * (cr.monthly||0) };
    }).filter(r=>r.label && r.value>0).sort((a,b)=>b.value-a.value);
  }

  function computeTeacherPayout(){
    const byTeacher = {};
    tpayList.forEach(t=>{
      const key = normName(t.teacher);
      if(!key) return;
      if(!byTeacher[key]) byTeacher[key] = { label: t.teacher, value: 0 };
      byTeacher[key].value += (t.paid||0);
    });
    return Object.values(byTeacher).sort((a,b)=>b.value-a.value);
  }
 
  function computeAdmissionSource(){
    const PALETTE = ['var(--brand)','var(--blue)','var(--violet)','var(--green)','var(--amber)','var(--red)','var(--yellow)','var(--slate)'];
    const bySource = {};
    enquiriesList.forEach(e=>{
      const key = normName(e.source);
      if(!key) return;
      if(!bySource[key]) bySource[key] = { label: e.source, count: 0 };
      bySource[key].count += 1;
    });
    const rows = Object.values(bySource).sort((a,b)=>b.count-a.count);
    const total = rows.reduce((a,r)=>a+r.count,0) || 1;
    return rows.map((r,i)=>({
      label: r.label,
      value: Math.round(r.count/total*100),
      color: PALETTE[i % PALETTE.length]
    }));
  }

  function renderPage(){
    
    const ch = {
      collectionTrend: collectionTrendLive || DB.charts.collectionTrend,
      incomeExpense: incomeExpenseLive || DB.charts.incomeExpense,
      admissionSource: computeAdmissionSource(),
      courseRevenue: computeCourseRevenue(),
      teacherPayout: computeTeacherPayout()
    };
    const chartsAreLive = !!(collectionTrendLive && incomeExpenseLive);

    /* ───────── KPI strip (computed live from fetched data) ───────── */
    const totalCollection = feesList.reduce((a,f)=>a+(f.paid||0),0);
    const outstanding = pendingList.reduce((a,p)=>a+(p.due||0),0);
    const netProfit = incomeList.reduce((a,x)=>a+(x.amount||0),0) - expenseList.reduce((a,x)=>a+(x.amount||0),0);
    const isLoss = netProfit < 0;
    const newAdmissions = studentsList.filter(s=>(s.admission||'').startsWith(selectedMonth)).length;
    const mLabel = monthLabel(selectedMonth);

    const kpis=`
      <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
        <div class="kpi"><div class="top"><span class="label">Total Collection (${mLabel})</span><span class="ic b-green">${App.svg('rupee')}</span></div><div class="val">${App.money(totalCollection)}</div><span class="delta up">${App.svg('up')}10.6% MoM</span></div>
        <div class="kpi"><div class="top"><span class="label">Outstanding Dues</span><span class="ic b-red">${App.svg('pending')}</span></div><div class="val">${App.money(outstanding)}</div><span class="delta down">${App.svg('down')}6% vs last month</span></div>
        <div class="kpi"><div class="top"><span class="label">${isLoss?'Net Loss':'Net Profit'}</span><span class="ic ${isLoss?'b-red':'b-brand'}">${App.svg('trending')}</span></div><div class="val">${App.money(Math.abs(netProfit))}</div><span class="delta ${isLoss?'down':'up'}">${App.svg(isLoss?'down':'up')}12% MoM</span></div>
        <div class="kpi"><div class="top"><span class="label">New Admissions</span><span class="ic b-blue">${App.svg('admit')}</span></div><div class="val">${newAdmissions}</div><span class="delta up">${App.svg('up')}+2 vs last month</span></div>
      </div>`;

    /* ───────── Charts (Course-wise Revenue & Teacher-wise Payout are live) ───────── */
    const charts=`
      <div class="grid-2 mb16">
        <div class="card"><div class="card-head"><div><h3>Monthly Fee Collection${chartsAreLive?'':' <span class="badge b-amber" style="font-size:10px;vertical-align:middle">mock data</span>'}</h3><div class="sub">₹ in '000</div></div><button class="btn btn-light btn-sm" onclick="App.toast('Exported','ok')">${App.svg('download')}Export</button></div><div class="card-body">${App.barChart(ch.collectionTrend,{color:'bar-brand'})}</div></div>
        <div class="card"><div class="card-head"><div><h3>Income vs Expense${chartsAreLive?'':' <span class="badge b-amber" style="font-size:10px;vertical-align:middle">mock data</span>'}</h3><div class="sub">6-month comparison, ₹ in '000</div></div></div><div class="card-body">${App.barChart(ch.incomeExpense.map(x=>({m:x.m,a:x.inc,b:x.exp})),{stacked:true})}</div></div>
      </div>
      <div class="grid-3 mb16">
        <div class="card"><div class="card-head"><h3>Course-wise Revenue</h3></div><div class="card-body">${App.hbars(ch.courseRevenue.slice(0,6),App.money)}</div></div>
        <div class="card"><div class="card-head"><h3>Teacher-wise Payout</h3></div><div class="card-body">${App.hbars(ch.teacherPayout.slice(0,6),App.money)}</div></div>
        <div class="card"><div class="card-head"><h3>Admission Sources</h3></div><div class="card-body">${App.donut(ch.admissionSource)}</div></div>
      </div>`;

    /* ───────── All Reports table ───────── */
    const allReports=`
      <div class="card">
        <div class="card-head">
          <div><h3>All Reports</h3><div class="sub">Click View to open the report with live data</div></div>
          <div class="seg" id="catSeg">
            <button class="active" onclick="filterCat(this,'')">All</button>
            <button onclick="filterCat(this,'Finance')">Finance</button>
            <button onclick="filterCat(this,'Academic')">Academic</button>
            <button onclick="filterCat(this,'Marketing')">Marketing</button>
          </div>
        </div>
        <div class="tbl-wrap">
          <table class="tbl" id="rptTbl">
            <thead><tr>
              <th>Report</th><th>Category</th><th>Period</th><th class="num">Records</th>
              <th>Last Generated</th><th style="text-align:right">Action</th>
            </tr></thead>
            <tbody>${REPORTS.map(r=>`<tr data-cat="${r.cat}">
              <td class="t-main">${r.name}</td>
              <td><span class="badge ${catClass[r.cat]||'b-slate'}"><span class="pip"></span>${r.cat}</span></td>
              <td>${r.period}</td>
              <td class="num">${recordCount(r.key)}</td>
              <td class="t-sub" data-lastgen="${r.key}">${reportLogs[r.key] || 'Not yet generated'}</td>
              <td style="text-align:right">
                <div class="act" style="justify-content:flex-end">
                  ${App.actBtn('eye','View Report',`onclick="viewReport('${r.key}','${r.name}','${r.period}')"`)}
                  ${App.actBtn('download','Download',`onclick="reportAction('${r.key}','${r.name}','export')"`)}
                  ${App.actBtn('print','Print',`onclick="reportAction('${r.key}','${r.name}','print')"`)}
                </div>
              </td>
            </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>`;

    c.innerHTML = kpis + charts + allReports;
  }

  /* ───────── Category filter ───────── */
  window.filterCat=function(btn, cat){
    document.querySelectorAll('#catSeg button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('#rptTbl tbody tr').forEach(tr=>{
      tr.style.display = (!cat || tr.dataset.cat===cat) ? '' : 'none';
    });
  };

  window.reportAction=function(key, name, action){
    App.toast(action==='export' ? `${name} downloaded` : 'Sent to printer', 'ok');
    logReport(key, name, action);
  };

  /* ───────── Helpers ───────── */
  const th=(...cols)=>`<thead><tr>${cols.map(c=>typeof c==='object'?`<th class="${c.cls||''}">${c.label}</th>`:`<th>${c}</th>`).join('')}</tr></thead>`;
  const tblWrap=html=>`<div class="tbl-wrap"><table class="tbl">${html}</table></div>`;
  const sumBar=(label,val,cls='')=>`<div class="pl-line ${cls}"><span>${label}</span><span class="v">${App.money(val)}</span></div>`;

  /* ───────── Report modal bodies (sourced from live *List arrays) ───────── */
  function buildBody(key, period){
    switch(key){

      /* ── 1. Daily Fee Collection ── */
      case 'daily-fee':
        return tblWrap(
          th('Receipt #','Student','Batch','Fee Type',{label:'Due',cls:'num'},{label:'Paid',cls:'num'},
             {label:'Disc',cls:'num'},'Mode','Collected By','Time')+
          `<tbody>${feesList.slice(0,12).map(f=>`<tr>
            <td class="t-id">${f.id}</td>
            <td class="t-main">${f.student}</td>
            <td>${f.batch}</td>
            <td>${f.feeType}</td>
            <td class="num">${App.money(f.due)}</td>
            <td class="num" style="color:var(--green);font-weight:600">${App.money(f.paid)}</td>
            <td class="num">${f.discount?App.money(f.discount):'—'}</td>
            <td>${App.badge(f.mode==='Cash'?'Cash':f.mode)}</td>
            <td>${f.collectedBy}</td>
            <td class="t-sub">09:${String(10+feesList.indexOf(f)).padStart(2,'0')} AM</td>
          </tr>`).join('')}</tbody>`
        );

      /* ── 2. Monthly Fee Collection ── */
      case 'monthly-fee':
        return tblWrap(
          th('Student','Batch','Fee Type','Period',{label:'Due',cls:'num'},{label:'Paid',cls:'num'},
             {label:'Disc',cls:'num'},{label:'Balance',cls:'num'},'Mode','Status')+
          `<tbody>${feesList.slice(0,20).map(f=>`<tr>
            <td class="t-main">${f.student}</td>
            <td>${f.batch}</td>
            <td>${f.feeType}</td>
            <td>${f.period}</td>
            <td class="num">${App.money(f.due)}</td>
            <td class="num">${App.money(f.paid)}</td>
            <td class="num">${f.discount?App.money(f.discount):'—'}</td>
            <td class="num">${f.balance?App.money(f.balance):'—'}</td>
            <td>${f.mode}</td>
            <td>${App.badge('Paid')}</td>
          </tr>`).join('')}</tbody>`
        );

      /* ── 3. Pending Fees ── */
      case 'pending-fees':
        return tblWrap(
          th('Student','Parent Mobile','Batch','Fee Type','Period',{label:'Due',cls:'num'},
             'Due Date','Days Overdue','Follow-up','Promise Date')+
          `<tbody>${pendingList.map(p=>`<tr>
            <td class="t-main">${p.student}</td>
            <td class="num">${p.parentMobile}</td>
            <td>${p.batch}</td>
            <td>${p.feeType}</td>
            <td>${p.period}</td>
            <td class="num" style="color:var(--red);font-weight:600">${App.money(p.due)}</td>
            <td>${p.dueDate}</td>
            <td class="num">${p.overdue > 30 ? `<span style="color:var(--red);font-weight:600">${p.overdue}d</span>` : p.overdue+'d'}</td>
            <td>${App.badge(p.follow==='Promised'?'Interested':p.follow==='Reminder Sent'?'Contacted':'New')}</td>
            <td class="t-sub">${p.promise}</td>
          </tr>`).join('')}</tbody>`
        );

      /* ── 4. Teacher Payment Due ── */
      case 'teacher-due':
        return tblWrap(
          th('Teacher','Pay Type',{label:'Gross',cls:'num'},{label:'Deductions',cls:'num'},
             {label:'Advance',cls:'num'},{label:'Net Payable',cls:'num'},
             {label:'Paid',cls:'num'},{label:'Balance',cls:'num'},'Status')+
          `<tbody>${tpayList.filter(t=>t.status!=='Paid').map(t=>`<tr>
            <td>${App.whoCell(t.teacher)}</td>
            <td><span style="font-size:12px;color:var(--ink-3)">${t.payType}</span></td>
            <td class="num">${App.money(t.gross)}</td>
            <td class="num">${t.ded?App.money(t.ded):'—'}</td>
            <td class="num">${t.adv?App.money(t.adv):'—'}</td>
            <td class="num" style="font-weight:600">${App.money(t.net)}</td>
            <td class="num">${t.paid?App.money(t.paid):'—'}</td>
            <td class="num" style="color:var(--red);font-weight:600">${App.money(t.balance)}</td>
            <td>${App.badge(t.status)}</td>
          </tr>`).join('')}</tbody>`
        );

      /* ── 5. Income Report ── */
      case 'income': {
        const total=incomeList.reduce((a,x)=>a+x.amount,0);
        return tblWrap(
          th('ID','Date','Category','Description','Mode',{label:'Amount',cls:'num'})+
          `<tbody>${incomeList.map(x=>`<tr>
            <td class="t-id">${x.id}</td>
            <td>${x.date}</td>
            <td><span class="badge b-green"><span class="pip"></span>${x.category}</span></td>
            <td>${x.desc}</td>
            <td>${x.mode}</td>
            <td class="num" style="color:var(--green);font-weight:600">${App.money(x.amount)}</td>
          </tr>`).join('')}
          <tr style="background:var(--brand-tint)">
            <td colspan="5" style="font-weight:700;text-align:right;color:var(--ink)">Total Income</td>
            <td class="num" style="font-weight:700;color:var(--brand-700)">${App.money(total)}</td>
          </tr></tbody>`
        );
      }

      /* ── 6. Expense Report ── */
      case 'expense': {
        const total=expenseList.reduce((a,x)=>a+x.amount,0);
        return tblWrap(
          th('ID','Date','Category','Description','Vendor','Mode',{label:'Amount',cls:'num'})+
          `<tbody>${expenseList.map(x=>`<tr>
            <td class="t-id">${x.id}</td>
            <td>${x.date}</td>
            <td><span class="badge b-red"><span class="pip"></span>${x.category}</span></td>
            <td>${x.desc}</td>
            <td class="t-sub">${x.vendor}</td>
            <td>${x.mode}</td>
            <td class="num" style="color:var(--red);font-weight:600">${App.money(x.amount)}</td>
          </tr>`).join('')}
          <tr style="background:var(--red-soft)">
            <td colspan="6" style="font-weight:700;text-align:right;color:var(--ink)">Total Expenses</td>
            <td class="num" style="font-weight:700;color:var(--red)">${App.money(total)}</td>
          </tr></tbody>`
        );
      }

      /* ── 7. Profit & Loss ── */
      case 'pnl': {
        const inc=incomeList.reduce((a,x)=>a+x.amount,0);
        const exp=expenseList.reduce((a,x)=>a+x.amount,0);
        const tcPaid=tpayList.reduce((a,t)=>a+t.paid,0);
        const rent=78000, elec=18000, internet=4800, staff=96000, mktg=32000, misc=22000;
        const net=inc-exp;
        const plIsLoss = net < 0;
        return `
          <div style="max-width:560px;margin:0 auto">
            <div style="padding:14px 0;border-bottom:2px solid var(--line);margin-bottom:16px">
              <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-4);font-weight:700;margin-bottom:10px">Income</div>
              ${sumBar('Total Income (recorded)',inc,'plus')}
              <div class="pl-line" style="background:var(--brand-soft);font-weight:700"><span>Gross Income</span><span class="v">${App.money(inc)}</span></div>
            </div>
            <div style="padding:14px 0;border-bottom:2px solid var(--line);margin-bottom:16px">
              <div style="font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-4);font-weight:700;margin-bottom:10px">Expenses</div>
              ${sumBar('Teacher Salaries & Payouts',tcPaid,'minus')}
              ${sumBar('Staff Salary',staff,'minus')}
              ${sumBar('Rent',rent,'minus')}
              ${sumBar('Electricity & Utilities',elec+internet,'minus')}
              ${sumBar('Marketing',mktg,'minus')}
              ${sumBar('Miscellaneous',misc,'minus')}
              <div class="pl-line" style="background:var(--red-soft);font-weight:700"><span>Total Expenses (recorded)</span><span class="v" style="color:var(--red)">${App.money(exp)}</span></div>
            </div>
            <div class="pl-line total" style="font-size:16px">
              <span>${plIsLoss?'Net Loss':'Net Profit'} (${period})</span><span class="v" style="${plIsLoss?'color:var(--red)':''}">${App.money(Math.abs(net))}</span>
            </div>
            <div style="text-align:center;margin-top:12px;color:var(--ink-3);font-size:12.5px">Profit Margin: <b style="color:${plIsLoss?'var(--red)':'var(--brand)'}">${inc?Math.round(net/inc*1000)/10:0}%</b></div>
          </div>`;
      }

      /* ── 8. Student Attendance ── */
      case 'stu-att':
        return tblWrap(
          th('Student ID','Student','Batch','Course',
             {label:'Present',cls:'num'},{label:'Absent',cls:'num'},{label:'Late',cls:'num'},
             {label:'Att %',cls:'num'},'Status')+
          `<tbody>${studentsList.map(s=>{
            const tot=24, pct=s.att;
            const pres=Math.round(tot*pct/100), abs=tot-pres-Math.floor(Math.random()*2);
            const late=tot-pres-abs;
            return `<tr>
              <td class="t-id">${s.id}</td>
              <td>${App.whoCell(s.name,s.cls)}</td>
              <td>${s.batch}</td>
              <td class="t-sub">${s.course}</td>
              <td class="num">${pres}</td>
              <td class="num" style="${abs>5?'color:var(--red)':''}">${abs}</td>
              <td class="num">${late>0?late:'—'}</td>
              <td class="num"><div class="pct-cell" style="justify-content:flex-end">
                <span style="font-weight:600;color:${pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)'}">${pct}%</span>
              </div></td>
              <td>${App.badge(pct>=80?'Active':pct>=60?'Rescheduled':'Overdue')}</td>
            </tr>`;
          }).join('')}</tbody>`
        );

      /* ── 9. Batch Attendance ── */
      case 'batch-att':
        return tblWrap(
          th('Batch','Course','Subject','Teacher','Total Students',
             {label:'Classes (Jun)',cls:'num'},{label:'Avg Present',cls:'num'},
             {label:'Att %',cls:'num'},'Type')+
          `<tbody>${batchesList.filter(b=>b.status!=='Upcoming').map(b=>{
            const classes=20, pct=70+Math.floor(Math.random()*25);
            return `<tr>
              <td class="t-main">${b.name}</td>
              <td class="t-sub">${b.course}</td>
              <td>${b.subject}</td>
              <td>${b.teacher}</td>
              <td class="num">${b.cur}</td>
              <td class="num">${classes}</td>
              <td class="num">${Math.round(b.cur*pct/100)}</td>
              <td class="num"><span style="font-weight:600;color:${pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)'}">${pct}%</span></td>
              <td>${App.badge(b.status)}</td>
            </tr>`;
          }).join('')}</tbody>`
        );

      /* ── 10. Admission Report ── */
      case 'admissions':
        return tblWrap(
          th('Student ID','Student','Class','Course','Batch',
             'Fee Type',{label:'Fee Amt',cls:'num'},'Source','Admission Date','Status')+
          `<tbody>${studentsList.slice(0,31).map(s=>`<tr>
            <td class="t-id">${s.id}</td>
            <td>${App.whoCell(s.name,s.cls)}</td>
            <td>${s.cls}</td>
            <td class="t-sub">${s.course}</td>
            <td>${s.batch}</td>
            <td>${s.feeType}</td>
            <td class="num">${App.money(s.feeAmt)}</td>
            <td><span class="chip">${DB.sources[studentsList.indexOf(s)%DB.sources.length]}</span></td>
            <td>${s.admission}</td>
            <td>${App.badge(s.status)}</td>
          </tr>`).join('')}</tbody>`
        );

      /* ── 11. Enquiry Conversion ── */
      case 'enquiry-conv':
        return tblWrap(
          th('Enq ID','Student Name','Class','Course Interested','Source','Date','Counselor','Status')+
          `<tbody>${enquiriesList.map(e=>`<tr>
            <td class="t-id">${e.id}</td>
            <td class="t-main">${e.name}</td>
            <td>${e.cls}</td>
            <td class="t-sub">${e.course}</td>
            <td><span class="chip">${e.source}</span></td>
            <td>${e.date}</td>
            <td>${e.counselor}</td>
            <td>${App.badge(e.status)}</td>
          </tr>`).join('')}</tbody>`
        );

      /* ── 12. Course-wise Revenue ── */
      case 'course-rev':
        return tblWrap(
          th('Course','Category','Level',{label:'Monthly Fee',cls:'num'},
             {label:'Active Students',cls:'num'},{label:'Monthly Revenue',cls:'num'},
             {label:'Annual Rev (Est.)',cls:'num'},'Status')+
          `<tbody>${coursesList.map(cr=>{
            const studs=studentsList.filter(s=>s.course===cr.name&&s.status==='Active').length;
            const mrev=studs*cr.monthly;
            return `<tr>
              <td class="t-main">${cr.name}</td>
              <td>${cr.category}</td>
              <td>${cr.level}</td>
              <td class="num">${App.money(cr.monthly)}</td>
              <td class="num">${studs}</td>
              <td class="num" style="font-weight:600;color:var(--brand)">${App.money(mrev)}</td>
              <td class="num">${App.money(mrev*12)}</td>
              <td>${App.badge(cr.status)}</td>
            </tr>`;
          }).join('')}</tbody>`
        );

      /* ── 13. Batch-wise Revenue ── */
      case 'batch-rev':
        return tblWrap(
          th('Batch','Course','Teacher',{label:'Students',cls:'num'},
             'Dominant Fee Type',{label:'Avg Fee',cls:'num'},
             {label:'Monthly Revenue',cls:'num'},'Status')+
          `<tbody>${batchesList.map(b=>{
            const cr=coursesList.find(c=>c.name===b.course)||{monthly:1800};
            const rev=b.cur*cr.monthly;
            return `<tr>
              <td class="t-main">${b.name}</td>
              <td class="t-sub">${b.course}</td>
              <td>${b.teacher}</td>
              <td class="num">${b.cur}</td>
              <td>Monthly Fee</td>
              <td class="num">${App.money(cr.monthly)}</td>
              <td class="num" style="font-weight:600;color:var(--brand)">${App.money(rev)}</td>
              <td>${App.badge(b.status)}</td>
            </tr>`;
          }).join('')}</tbody>`
        );

      /* ── 14. Payment Mode Report ── */
      case 'pay-mode': {
        const modes=['Cash','UPI','Bank Transfer','Card','Cheque'];
        const totFees=feesList.reduce((a,f)=>a+f.paid,0) || 1;
        const modeData=modes.map(m=>{
          const txns=feesList.filter(f=>f.mode===m);
          const amt=txns.reduce((a,f)=>a+f.paid,0);
          return {mode:m, count:txns.length, amt, avg:txns.length?Math.round(amt/txns.length):0, pct:Math.round(amt/totFees*100)};
        });
        return tblWrap(
          th('Payment Mode',{label:'Transactions',cls:'num'},{label:'Total Amount',cls:'num'},
             {label:'Avg per Txn',cls:'num'},{label:'% of Total',cls:'num'},'Trend')+
          `<tbody>${modeData.map(m=>`<tr>
            <td class="t-main">${m.mode}</td>
            <td class="num">${m.count||'—'}</td>
            <td class="num" style="font-weight:600">${App.money(m.amt)}</td>
            <td class="num">${m.avg?App.money(m.avg):'—'}</td>
            <td class="num"><span style="font-weight:600;color:var(--brand)">${m.pct}%</span></td>
            <td><div class="track" style="width:120px;height:8px;border-radius:5px;background:var(--surface-3);overflow:hidden"><span style="display:block;height:100%;border-radius:5px;background:var(--brand);width:${m.pct}%"></span></div></td>
          </tr>`).join('')}
          <tr style="background:var(--brand-tint)">
            <td style="font-weight:700">Total</td>
            <td class="num" style="font-weight:700">${feesList.length}</td>
            <td class="num" style="font-weight:700;color:var(--brand-700)">${App.money(totFees)}</td>
            <td colspan="3"></td>
          </tr></tbody>`
        );
      }

      /* ── 15. Discount Report ── */
      case 'discount': {
        const discFees=feesList.filter(f=>f.discount>0);
        const totalDisc=discFees.reduce((a,f)=>a+f.discount,0);
        return tblWrap(
          th('Receipt #','Student','Batch','Fee Type',
             {label:'Original Fee',cls:'num'},{label:'Discount',cls:'num'},
             {label:'Disc %',cls:'num'},'Mode','Date','Reason')+
          `<tbody>${discFees.map(f=>`<tr>
            <td class="t-id">${f.id}</td>
            <td class="t-main">${f.student}</td>
            <td>${f.batch}</td>
            <td>${f.feeType}</td>
            <td class="num">${App.money(f.due)}</td>
            <td class="num" style="color:var(--amber);font-weight:600">${App.money(f.discount)}</td>
            <td class="num">${Math.round(f.discount/f.due*100)}%</td>
            <td>${f.mode}</td>
            <td>${f.date}</td>
            <td class="t-sub">${['Sibling discount','Merit scholarship','Staff concession','Early payment','Need-based'][feesList.indexOf(f)%5]}</td>
          </tr>`).join('')}
          <tr style="background:var(--amber-soft)">
            <td colspan="4" style="font-weight:700;text-align:right;color:var(--ink)">Total Discount Given</td>
            <td class="num" style="font-weight:700">${App.money(discFees.reduce((a,f)=>a+f.due,0))}</td>
            <td class="num" style="font-weight:700;color:var(--amber)">${App.money(totalDisc)}</td>
            <td colspan="4"></td>
          </tr></tbody>`
        );
      }

      default:
        return `<div class="empty"><div class="ic">${App.svg('reports')}</div><h4>Report not available</h4></div>`;
    }
  }

  /* ───────── viewReport ───────── */
  window.viewReport=function(key, name, period){
    const body=buildBody(key, period);
    const isFullWidth=['stu-att','monthly-fee','admissions','enquiry-conv','course-rev','batch-rev','pay-mode','discount','batch-att'].includes(key);
    App.modal({
      title: name,
      sub: `Period: ${period} · Generated ${reportLogs[key] || 'just now'}`,
      size: isFullWidth ? 'xl' : 'lg',
      body,
      foot: `
        <span style="color:var(--ink-3);font-size:12.5px">BrightPath Coaching Centre</span>
        <div style="display:flex;gap:9px">
          <button class="btn btn-light" onclick="reportAction('${key}','${name}','export')">${App.svg('download')}Export PDF</button>
          <button class="btn btn-light" onclick="reportAction('${key}','${name}','print')">${App.svg('print')}Print</button>
          <button class="btn btn-primary" data-close>Close</button>
        </div>`
    });
    logReport(key, name, 'view');
  };

  (async function init(){
    c.innerHTML = `<div class="empty"><div class="ic">${App.svg('reports')}</div><h4>Loading reports…</h4></div>`;
    await loadAllData();
    renderPage();
  })();
}
</script>
</body></html>
