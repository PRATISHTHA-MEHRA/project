<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable · BrightPath Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin-style.css">
</head>
<body>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/admin-app.js"></script>
<script>
if(App.guard()){
  const head=`<button class="btn btn-light" onclick="App.toast('Timetable exported (PDF)','ok')">${App.svg('print')}Print</button>`;
  const c=App.layout('timetable','Timetable',['Timetable'],head);
  c.innerHTML=`<div class="card mb16"><div class="toolbar">
      <div class="seg" id="viewSeg">
        <button class="active" data-v="today">Today</button><button data-v="weekly">Weekly</button>
        <button data-v="teacher">Teacher-wise</button><button data-v="batch">Batch-wise</button><button data-v="room">Classroom-wise</button>
      </div><div class="grow"></div>
      <input type="date" class="filter-sel" id="ttDate" value="${new Date().toISOString().slice(0,10)}" style="min-width:150px">
    </div><div id="ttBody" style="padding:18px"><div class="tt-slot" style="color:var(--ink-4)">Loading timetable…</div></div></div>`;


  function unwrapList(res){ return Array.isArray(res?.data) ? res.data : (res?.data ? [res.data] : []); }
  function unwrapOne(res){ return res?.data ?? null; }

  let currentView='today';
  let currentSlots=[]; 
  const dateInput=document.getElementById('ttDate');

  function slot(cl){ return `<div class="tt-slot"><div class="tt-time">${cl.st} – ${cl.et}</div>
    <div class="tt-info"><b>${cl.batch}</b> · ${cl.subject} <div class="m">${cl.teacher} · ${cl.room} · ${cl.students} students</div></div>
    ${App.badge(cl.status)}
    <div class="act" style="margin-left:10px">${App.actBtn('eye','View',`onclick="viewClass('${cl.id}')"`)}${App.actBtn('calendar','Reschedule',`onclick="App.toast('Reschedule request sent','ok')"`)}</div></div>`; }

  function emptyRow(msg){ return `<div class="tt-slot" style="color:var(--ink-4)">${msg}</div>`; }

  async function load(v){
    currentView=v;
    const host=document.getElementById('ttBody');
    host.innerHTML=emptyRow('Loading timetable…');
    const date=dateInput.value;

    try{
      if(v==='today'){
        const res=await API.get(`/timetable?view=today&date=${date}`);
        const rows=unwrapList(res);
        currentSlots=rows;
        const dayLabel=res?.day ? `${res.day}, ${formatDate(date)}` : formatDate(date);
        host.innerHTML=`<div class="tt-day"><div class="dh">${dayLabel} <span class="t-sub">${rows.length} classes</span></div>${rows.length?rows.map(slot).join(''):emptyRow('No classes scheduled')}</div>`;

      } else if(v==='weekly'){
        const res=await API.get(`/timetable?view=weekly&date=${date}`);
        const groups=Array.isArray(res?.data)?res.data:[];
        currentSlots=groups.flatMap(g=>g.classes);
        host.innerHTML=`<div class="tt-grid">${groups.map(g=>`<div class="tt-day"><div class="dh">${g.day} <span class="t-sub">${g.classes.length} classes</span></div>${g.classes.length?g.classes.map(slot).join(''):emptyRow('No classes scheduled')}</div>`).join('')}</div>`;

      } else {
        // teacher / batch / room views group the same raw slot list client-side
        const res=await API.get(`/timetable?date=${date}`);
        const all=unwrapList(res);
        currentSlots=all;

        if(v==='teacher'){
          const teachers=[...new Set(all.map(c=>c.teacher))];
          host.innerHTML=`<div class="tt-grid">${teachers.map(t=>{ const cls=all.filter(c=>c.teacher===t); return `<div class="tt-day"><div class="dh">${t} <span class="t-sub">${cls.length} classes</span></div>${cls.map(slot).join('')}</div>`; }).join('')||emptyRow('No teachers scheduled')}</div>`;

        } else if(v==='batch'){
          host.innerHTML=`<div class="tt-grid">${all.map(c=>`<div class="tt-day"><div class="dh">${c.batch} <span class="t-sub">${c.days}</span></div>${slot(c)}</div>`).join('')||emptyRow('No batches scheduled')}</div>`;

        } else { // room
          const rooms=[...new Set(all.map(c=>c.room))];
          host.innerHTML=`<div class="tt-grid">${rooms.map(r=>{ const cls=all.filter(c=>c.room===r); return `<div class="tt-day"><div class="dh">${r} <span class="t-sub">${cls.length} classes</span></div>${cls.length?cls.map(slot).join(''):emptyRow('Room free')}</div>`; }).join('')||emptyRow('No rooms in use')}</div>`;
        }
      }
    }catch(err){
      host.innerHTML=emptyRow('Could not load timetable.');
      App.toast(err.message || 'Failed to load timetable','err');
    }
  }

  function formatDate(iso){
    const d=new Date(`${iso}T00:00:00`);
    return d.toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'});
  }

  load('today');
  document.querySelectorAll('#viewSeg button').forEach(b=>b.onclick=()=>{ document.querySelectorAll('#viewSeg button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); load(b.dataset.v); });
  dateInput.onchange=()=>load(currentView);



  window.viewClass=id=>{
    const cl=currentSlots.find(c=>c.id===id);
    if(!cl) return;
    App.modal({size:'md',title:cl.batch,sub:cl.subject,
      body:`<div class="dl cols-2"><div class="it"><div class="k">Teacher</div><div class="v">${cl.teacher}</div></div>
        <div class="it"><div class="k">Room</div><div class="v">${cl.room}</div></div>
        <div class="it"><div class="k">Time</div><div class="v">${cl.st} – ${cl.et}</div></div><div class="it"><div class="k">Students</div><div class="v">${cl.students}</div></div>
        <div class="it"><div class="k">Status</div><div class="v">${App.badge(cl.status)}</div></div></div>
      <div class="sec-title">Actions</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-light btn-sm" onclick="App.toast('Class rescheduled','ok')">${App.svg('calendar')}Reschedule</button>
        <button class="btn btn-light btn-sm" onclick="App.toast('Class cancelled','ok')">${App.svg('x')}Cancel</button>
        <button class="btn btn-light btn-sm" onclick="App.toast('Substitute assigned','ok')">${App.svg('teacher')}Assign Substitute</button>
        <button class="btn btn-amber btn-sm" onclick="App.toast('Students notified','ok')">${App.svg('bell')}Notify Students</button>
      </div>`
    }); };
}
</script>
</body></html>
