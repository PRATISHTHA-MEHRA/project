<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings · BrightPath Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/admin-style.css">
</head>
<body>
<script src="assets/js/admin-data.js"></script>
<script src="assets/js/admin-app.js"></script>
<script src="assets/js/api.js"></script>
<script>
if(App.guard()){


  function unwrapOne(res){ return res?.data ?? res ?? {}; }
  function unwrapList(res){ const d = res?.data ?? res; return Array.isArray(d) ? d : (d?.rows || []); }
  function normName(s){ return String(s||'').trim().toLowerCase(); }

  const head=`<button class="btn btn-primary" id="saveTop">${App.svg('check')}Save Changes</button>`;
  const c=App.layout('settings','Settings',['Settings'],head);
  c.innerHTML=`
    <div class="tabs" id="setTabs">
      <div class="tab active" data-t="t1">Centre Profile</div><div class="tab" data-t="t2">Branches & Classrooms</div>
      <div class="tab" data-t="t3">Fee Reminders</div><div class="tab" data-t="t4">Roles & Permissions</div>
      <div class="tab" data-t="t5">Notification Templates</div><div class="tab" data-t="t6">Academic Year</div></div>

    <div class="tab-pane active" data-p="t1"><div class="card"><div class="card-head"><h3>Centre Profile</h3></div>
      <div class="card-body" id="profileBody"><div class="empty"><p>Loading…</p></div></div></div></div>

    <div class="tab-pane" data-p="t2"><div class="grid-2">
      <div class="card"><div class="card-head"><div><h3>Branches</h3></div><button class="btn btn-light btn-sm" id="addBranchBtn">${App.svg('plus')}Add</button></div>
        <div id="branchTbl"></div></div>
      <div class="card"><div class="card-head"><div><h3>Classrooms</h3></div><button class="btn btn-light btn-sm" id="addRoomBtn">${App.svg('plus')}Add</button></div>
        <div id="roomTbl"></div></div></div></div>

    <div class="tab-pane" data-p="t3"><div class="card"><div class="card-head"><h3>Fee Reminder Rules</h3></div>
      <div class="card-body" id="feeRulesBody"><div class="empty"><p>Loading…</p></div></div></div></div>

    <div class="tab-pane" data-p="t4"><div class="card"><div class="card-head"><div><h3>User Roles & Permissions</h3></div><button class="btn btn-light btn-sm" id="addRoleBtn">${App.svg('plus')}Add Role</button></div>
      <div id="roleTbl"></div></div></div>

    <div class="tab-pane" data-p="t5"><div class="card"><div class="card-head"><h3>Notification Templates</h3></div>
      <div class="card-body" id="templatesBody"><div class="empty"><p>Loading…</p></div></div></div></div>

    <div class="tab-pane" data-p="t6"><div class="card"><div class="card-head"><h3>Academic Year</h3></div>
      <div class="card-body" id="acadBody"><div class="empty"><p>Loading…</p></div></div></div></div>`;

  document.querySelectorAll('#setTabs .tab').forEach(t=>t.onclick=()=>{
    document.querySelectorAll('#setTabs .tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); document.querySelector(`[data-p="${t.dataset.t}"]`).classList.add('active');
    loadTab(t.dataset.t);
  });

  const loaded = {};
  const activeTab = () => document.querySelector('#setTabs .tab.active').dataset.t;

  function loadTab(t){
    if (loaded[t]) return;
    loaded[t] = true;
    if (t==='t1') loadProfile();
    if (t==='t2') { loadBranches(); loadClassrooms(); }
    if (t==='t3') loadFeeRules();
    if (t==='t4') loadRoles();
    if (t==='t5') loadTemplates();
    if (t==='t6') loadAcademicYear();
  }

  /* ---------------- Centre Profile ---------------- */
  function profileForm(p){
    return `<div class="form-grid">
      <div><label>Centre Name</label><input id="pf_centre_name" value="${p.centre_name||''}"></div>
      <div><label>Contact Number</label><input id="pf_contact_number" value="${p.contact_number||''}"></div>
      <div><label>Email</label><input id="pf_email" value="${p.email||''}"></div>
      <div><label>GST / Registration No.</label><input id="pf_gst_no" value="${p.gst_no||''}"></div>
      <div class="full"><label>Address</label><input id="pf_address" value="${p.address||''}"></div>
      <div><label>Receipt Prefix</label><input id="pf_receipt_prefix" value="${p.receipt_prefix||'RCP-'}"></div>
      <div><label>Currency</label><select id="pf_currency"><option ${p.currency==='INR (₹)'?'selected':''}>INR (₹)</option></select></div></div>`;
  }
  async function loadProfile(){
    try{ const p = unwrapOne(await API.get('/settings/profile'));
      document.getElementById('profileBody').innerHTML = profileForm(p);
    }catch(e){ App.toast('Failed to load centre profile: '+e.message,'err'); }
  }
  async function saveProfile(){
    const body = {
      centre_name: val('pf_centre_name'), contact_number: val('pf_contact_number'), email: val('pf_email'),
      gst_no: val('pf_gst_no'), address: val('pf_address'), receipt_prefix: val('pf_receipt_prefix'), currency: val('pf_currency')
    };
    try{ await API.put('/settings/profile', body); App.toast('Centre profile saved','ok'); }
    catch(e){ App.toast('Save failed: '+e.message,'err'); }
  }
  function val(id){ const el=document.getElementById(id); return el?el.value:''; }

  /* ---------------- Branches ---------------- */
  async function loadBranches(){
    try{
      const rows = unwrapList(await API.get('/settings/branches'));
      App.table('branchTbl', {
        columns: [ {key:'name',label:'Branch'}, {key:'location',label:'Location'},
          {key:'status',label:'Status', render:r=>App.badge(r.status)} ],
        rows, searchKeys:['name','location'],
        actions: r=>`${App.actBtn('edit','Edit',`onclick="editBranch(${r.id})"`)}${App.actBtn('trash','Delete',`onclick="removeBranch(${r.id})"`)}`,
        pageSize: 5
      });
      window._branches = rows;
    }catch(e){ App.toast('Failed to load branches: '+e.message,'err'); }
  }
  function branchModal(existing){
    App.modal({ title: existing?'Edit Branch':'Add Branch',
      body:`<div class="form-grid">
        <div class="full"><label>Branch Name</label><input id="bm_name" value="${existing?.name||''}"></div>
        <div><label>Location</label><input id="bm_location" value="${existing?.location||''}"></div>
        <div><label>Status</label><select id="bm_status"><option ${existing?.status==='Active'?'selected':''}>Active</option><option ${existing?.status==='Inactive'?'selected':''}>Inactive</option></select></div></div>`,
      foot:`<button class="btn btn-light" data-close>Cancel</button><button class="btn btn-primary" id="bmSave">Save</button>`,
      onOpen: b=>{ b.querySelector('#bmSave').onclick = async ()=>{
        const body = { name: val('bm_name'), location: val('bm_location'), status: val('bm_status') };
        try{
          if (existing) await API.put(`/settings/branches/${existing.id}`, body);
          else await API.post('/settings/branches', body);
          App.closeModal(); App.toast('Branch saved','ok'); loaded.t2=false; loadBranches();
        }catch(e){ App.toast('Save failed: '+e.message,'err'); }
      };}
    });
  }
  document.addEventListener('click', e=>{ if(e.target.closest('#addBranchBtn')) branchModal(null); });
  window.editBranch = (id)=> branchModal((window._branches||[]).find(b=>b.id===id));
  window.removeBranch = (id)=> App.confirmModal('Delete this branch?', async ()=>{
    try{ await API.delete(`/settings/branches/${id}`); App.toast('Branch deleted','ok'); loaded.t2=false; loadBranches(); }
    catch(e){ App.toast('Delete failed: '+e.message,'err'); }
  }, {danger:true, yes:'Delete'});

  /* ---------------- Classrooms ---------------- */
  async function loadClassrooms(){
    try{
      const rows = unwrapList(await API.get('/settings/classrooms'));
      App.table('roomTbl', {
        columns: [ {key:'room_name',label:'Room'}, {key:'capacity',label:'Capacity',num:true},
          {key:'status',label:'Status', render:r=>App.badge(r.status)} ],
        rows, searchKeys:['room_name'],
        actions: r=>`${App.actBtn('edit','Edit',`onclick="editRoom(${r.id})"`)}${App.actBtn('trash','Delete',`onclick="removeRoom(${r.id})"`)}`,
        pageSize: 6
      });
      window._rooms = rows;
    }catch(e){ App.toast('Failed to load classrooms: '+e.message,'err'); }
  }
  function roomModal(existing){
    App.modal({ title: existing?'Edit Classroom':'Add Classroom',
      body:`<div class="form-grid">
        <div class="full"><label>Room Name</label><input id="rm_name" value="${existing?.room_name||''}"></div>
        <div><label>Capacity</label><input class="num" id="rm_capacity" value="${existing?.capacity??''}"></div>
        <div><label>Status</label><select id="rm_status"><option ${existing?.status==='Active'?'selected':''}>Active</option><option ${existing?.status==='Inactive'?'selected':''}>Inactive</option></select></div></div>`,
      foot:`<button class="btn btn-light" data-close>Cancel</button><button class="btn btn-primary" id="rmSave">Save</button>`,
      onOpen: b=>{ b.querySelector('#rmSave').onclick = async ()=>{
        const body = { room_name: val('rm_name'), capacity: Number(val('rm_capacity'))||0, status: val('rm_status') };
        try{
          if (existing) await API.put(`/settings/classrooms/${existing.id}`, body);
          else await API.post('/settings/classrooms', body);
          App.closeModal(); App.toast('Classroom saved','ok'); loaded.t2=false; loadClassrooms();
        }catch(e){ App.toast('Save failed: '+e.message,'err'); }
      };}
    });
  }
  document.addEventListener('click', e=>{ if(e.target.closest('#addRoomBtn')) roomModal(null); });
  window.editRoom = (id)=> roomModal((window._rooms||[]).find(r=>r.id===id));
  window.removeRoom = (id)=> App.confirmModal('Delete this classroom?', async ()=>{
    try{ await API.delete(`/settings/classrooms/${id}`); App.toast('Classroom deleted','ok'); loaded.t2=false; loadClassrooms(); }
    catch(e){ App.toast('Delete failed: '+e.message,'err'); }
  }, {danger:true, yes:'Delete'});

  /* ---------------- Fee Reminder Rules ---------------- */
  function feeRulesForm(r){
    return `<div class="form-grid">
      <div><label>First Reminder (days before due)</label><input class="num" id="fr_first" value="${r.first_reminder_days??3}"></div>
      <div><label>Second Reminder (days after due)</label><input class="num" id="fr_second" value="${r.second_reminder_days??3}"></div>
      <div><label>Final Reminder (days after due)</label><input class="num" id="fr_final" value="${r.final_reminder_days??10}"></div>
      <div><label>Late Fine per day (₹)</label><input class="num" id="fr_fine" value="${r.late_fine_per_day??20}"></div>
      <div><label>Reminder Channel</label><select id="fr_channel">
        ${['WhatsApp + SMS','WhatsApp only','SMS only'].map(o=>`<option ${r.reminder_channel===o?'selected':''}>${o}</option>`).join('')}</select></div>
      <div><label>Auto-send reminders</label><select id="fr_auto">
        <option value="true" ${r.auto_send?'selected':''}>Enabled</option><option value="false" ${!r.auto_send?'selected':''}>Disabled</option></select></div></div>`;
  }
  async function loadFeeRules(){
    try{ const r = unwrapOne(await API.get('/settings/fee-rules'));
      document.getElementById('feeRulesBody').innerHTML = feeRulesForm(r);
    }catch(e){ App.toast('Failed to load fee rules: '+e.message,'err'); }
  }
  async function saveFeeRules(){
    const body = { first_reminder_days:+val('fr_first'), second_reminder_days:+val('fr_second'),
      final_reminder_days:+val('fr_final'), late_fine_per_day:+val('fr_fine'),
      reminder_channel: val('fr_channel'), auto_send: val('fr_auto')==='true' };
    try{ await API.put('/settings/fee-rules', body); App.toast('Fee reminder rules saved','ok'); }
    catch(e){ App.toast('Save failed: '+e.message,'err'); }
  }

  /* ---------------- Roles & Permissions ---------------- */
  async function loadRoles(){
    try{
      const rows = unwrapList(await API.get('/settings/roles'));
      App.table('roleTbl', {
        columns: [ {key:'role_name',label:'Role'}, {key:'user_count',label:'Users',num:true},
          {key:'permissions',label:'Permissions', render:r=>`<span class="chip">${r.permissions||''}</span>`},
          {key:'status',label:'Status', render:r=>App.badge(r.status)} ],
        rows, searchKeys:['role_name'],
        actions: r=>`${App.actBtn('edit','Edit',`onclick="editRole(${r.id})"`)}${App.actBtn('trash','Delete',`onclick="removeRole(${r.id})"`)}`,
        pageSize: 8
      });
      window._roles = rows;
    }catch(e){ App.toast('Failed to load roles: '+e.message,'err'); }
  }
  function roleModal(existing){
    App.modal({ title: existing?'Edit Role':'Add Role',
      body:`<div class="form-grid">
        <div class="full"><label>Role Name</label><input id="rl_name" value="${existing?.role_name||''}"></div>
        <div class="full"><label>Permissions (comma-separated)</label><input id="rl_perms" value="${existing?.permissions||''}"></div>
        <div><label>Status</label><select id="rl_status"><option ${existing?.status==='Active'?'selected':''}>Active</option><option ${existing?.status==='Inactive'?'selected':''}>Inactive</option></select></div></div>`,
      foot:`<button class="btn btn-light" data-close>Cancel</button><button class="btn btn-primary" id="rlSave">Save</button>`,
      onOpen: b=>{ b.querySelector('#rlSave').onclick = async ()=>{
        const body = { role_name: val('rl_name'), permissions: val('rl_perms'), status: val('rl_status') };
        try{
          if (existing) await API.put(`/settings/roles/${existing.id}`, body);
          else await API.post('/settings/roles', body);
          App.closeModal(); App.toast('Role saved','ok'); loaded.t4=false; loadRoles();
        }catch(e){ App.toast('Save failed: '+e.message,'err'); }
      };}
    });
  }
  document.addEventListener('click', e=>{ if(e.target.closest('#addRoleBtn')) roleModal(null); });
  window.editRole = (id)=> roleModal((window._roles||[]).find(r=>r.id===id));
  window.removeRole = (id)=> App.confirmModal('Delete this role?', async ()=>{
    try{ await API.delete(`/settings/roles/${id}`); App.toast('Role deleted','ok'); loaded.t4=false; loadRoles(); }
    catch(e){ App.toast('Delete failed: '+e.message,'err'); }
  }, {danger:true, yes:'Delete'});

  /* ---------------- Notification Templates ---------------- */
  async function loadTemplates(){
    try{
      const rows = unwrapList(await API.get('/settings/templates'));
      document.getElementById('templatesBody').innerHTML = rows.map(t=>
        `<div class="form-row"><label>${t.label}</label><textarea rows="2" data-key="${t.template_key}">${t.content}</textarea></div>`
      ).join('');
    }catch(e){ App.toast('Failed to load templates: '+e.message,'err'); }
  }
  async function saveTemplates(){
    const areas = document.querySelectorAll('#templatesBody textarea[data-key]');
    try{
      for (const a of areas) await API.put(`/settings/templates/${a.dataset.key}`, { content: a.value });
      App.toast('Notification templates saved','ok');
    }catch(e){ App.toast('Save failed: '+e.message,'err'); }
  }

  /* ---------------- Academic Year ---------------- */
  function acadForm(a){
    return `<div class="form-grid">
      <div><label>Current Academic Year</label><input id="ay_year" value="${a.current_year||''}"></div>
      <div><label>Session Start</label><input type="date" id="ay_start" value="${(a.session_start||'').slice(0,10)}"></div>
      <div><label>Session End</label><input type="date" id="ay_end" value="${(a.session_end||'').slice(0,10)}"></div>
      <div><label>Working Days</label><input id="ay_wdays" value="${a.working_days||'Mon – Sat'}"></div></div>
      <div class="sec-title">Holidays</div>
      <div class="chips" id="holidayChips">${(a.holidays||[]).map(h=>`<span class="chip">${h.label} ${App.svg('x')}<span data-hid="${h.id}" class="chip-x" style="cursor:pointer" onclick="removeHoliday(${h.id})">✕</span></span>`).join('')}</div>
      <div style="margin-top:10px;display:flex;gap:8px"><input id="ay_newholiday" placeholder="Add holiday label e.g. 15 Aug" style="max-width:240px">
      <button class="btn btn-light btn-sm" id="addHolidayBtn">${App.svg('plus')}Add Holiday</button></div>`;
  }
  async function loadAcademicYear(){
    try{ const a = unwrapOne(await API.get('/settings/academic-year'));
      document.getElementById('acadBody').innerHTML = acadForm(a);
      document.getElementById('addHolidayBtn').onclick = async ()=>{
        const label = val('ay_newholiday'); if(!label) return;
        try{ await API.post('/settings/academic-year/holidays', { label }); App.toast('Holiday added','ok'); loaded.t6=false; loadAcademicYear(); }
        catch(e){ App.toast('Add failed: '+e.message,'err'); }
      };
    }catch(e){ App.toast('Failed to load academic year: '+e.message,'err'); }
  }
  window.removeHoliday = (id)=> App.confirmModal('Remove this holiday?', async ()=>{
    try{ await API.delete(`/settings/academic-year/holidays/${id}`); App.toast('Holiday removed','ok'); loaded.t6=false; loadAcademicYear(); }
    catch(e){ App.toast('Remove failed: '+e.message,'err'); }
  }, {danger:true, yes:'Remove'});
  async function saveAcademicYear(){
    const body = { current_year: val('ay_year'), session_start: val('ay_start'), session_end: val('ay_end'), working_days: val('ay_wdays') };
    try{ await API.put('/settings/academic-year', body); App.toast('Academic year saved','ok'); }
    catch(e){ App.toast('Save failed: '+e.message,'err'); }
  }

  /* ---------------- Top "Save Changes" button routes to active tab ---------------- */
  document.getElementById('saveTop').onclick = ()=>{
    const t = activeTab();
    if (t==='t1') return saveProfile();
    if (t==='t3') return saveFeeRules();
    if (t==='t5') return saveTemplates();
    if (t==='t6') return saveAcademicYear();
    App.toast('Use Add / Edit / Delete on this tab — changes save immediately','info');
  };

  loadTab('t1'); // initial tab
}
</script>
</body></html>
